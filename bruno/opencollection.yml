opencollection: 1.0.0

info:
  name: Custom Agent
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: tmBaseUrl
      value: tm.localhost
    - name: pmBaseUrl
      value: pm.localhost
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
